<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Department Access Portal</title>
  <style>
    body {
      margin: 0;
      font-family: "Courier New", monospace;
      background-color: #050505;
      color: #e6e6e6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #0a0a0a;
      padding: 60px;
      border: 2px solid #2a2a2a;
      border-radius: 10px;
      width: 520px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 25px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    input, button {
      width: 100%;
      font-size: 16px;
    }

    input {
      padding: 14px;
      margin-top: 15px;
      background: #050505;
      color: #fff;
      border: 1px solid #2a2a2a;
    }

    button {
      margin-top: 20px;
      padding: 14px;
      background: #111;
      color: white;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
    }

    button:hover {
      background: #222;
    }

    .hidden {
      display: none;
    }

    .content {
      text-align: left;
      opacity: 0;
      font-size: 16px;
      line-height: 1.6;
      white-space: normal;
    }

    #error {
      margin-top: 15px;
      color: #ff4d4d;
      font-size: 14px;
      letter-spacing: 1px;
    }

    /* Glitch effect */
    .glitch {
      position: relative;
    }

    .glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 2px;
      top: 0;
      color: red;
      opacity: 0.15;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="container" id="loginBox">
  <h1 class="glitch" data-text="Project 12">Project 12</h1>
  <p>Enter authorization code</p>
  <input type="password" id="password" placeholder="Access Code">
  <button onclick="checkPassword()">Enter</button>
  <div id="error"></div>
</div>

<!-- MESSAGE -->
<div class="container hidden" id="contentBox">
  <h1>Classified Archive</h1>
  <div class="content" id="textContent"></div>
  <button id="proceedBtn" class="hidden" onclick="goToTabs()">Proceed</button>
</div>

<script>
  const correctPassword = "Hello, Baghdad!";

  function checkPassword() {
    const input = document.getElementById("password").value;
    const errorEl = document.getElementById("error");

    if (input === correctPassword) {
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("contentBox").classList.remove("hidden");
      errorEl.textContent = "";
      startTyping();
    } else {
      errorEl.textContent = "Access Denied";
    }
  }

  // Typewriter with line break support
  function typeText(text, el, speed, cb) {
    let i = 0;

    function t() {
      if (i < text.length) {
        let char = text[i++];

        if (char === "\n") {
          el.innerHTML += "<br>";
        } else {
          el.innerHTML += char;
        }

        setTimeout(t, speed);
      } else if (cb) cb();
    }

    t();
  }

  function startTyping() {
    const el = document.getElementById("textContent");
    el.style.opacity = 1;

    typeText(
      "Status: Restricted\nProject: Fire, walk with me\nDescription: This archive contains sensitive materials related to experimental operations. Unauthorized distribution is prohibited. Disseminating classified government information is illegal in almost every country in the world.",
      el,
      15,
      () => {
        document.getElementById("proceedBtn").classList.remove("hidden");
      }
    );
  }

  function goToTabs() {
    window.location.href = "tabs.html";
  }
</script>

</body>
</html>
